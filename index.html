<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 마음 번역기 - 클래스카드 스타일</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .app-container {
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: 650px;
        }

        .app-header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 25px 20px;
            text-align: center;
        }

        .app-header h1 {
            font-size: 24px;
            margin: 0 0 15px 0;
            font-weight: 800;
        }

        .tab-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px;
            border-radius: 12px;
            width: fit-content;
            margin: 0 auto;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 8px 16px;
            font-size: 15px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.7);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: white;
            color: #007bff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .content-area {
            padding: 30px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .section { display: none; }
        .section.active { display: flex; flex-direction: column; width: 100%; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* 1단계: 플래시카드 */
        .learn-progress {
            text-align: center;
            color: #6c757d;
            font-weight: 700;
            margin-bottom: 15px;
            font-size: 15px;
        }

        .flashcard-scene {
            width: 100%;
            height: 320px;
            perspective: 1000px;
            margin-bottom: 30px;
            cursor: pointer;
        }

        .flashcard-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            border-radius: 20px;
        }

        .flashcard-scene.is-flipped .flashcard-inner { transform: rotateY(180deg); }

        .flashcard-front, .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            padding: 30px;
            box-sizing: border-box;
            background: white;
            border: 2px solid #e9ecef;
            text-align: center;
            word-break: keep-all;
        }

        .flashcard-front { font-size: 42px; font-weight: 800; color: #212529; }
        .flashcard-back {
            transform: rotateY(180deg);
            background: #f8f9fa;
            font-size: 22px;
            font-weight: 600;
            color: #007bff;
            border-color: #cce5ff;
            line-height: 1.5;
            overflow-y: auto;
        }

        .controls { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .nav-btn {
            background: #f1f3f5; border: none; width: 60px; height: 60px; border-radius: 50%;
            font-size: 24px; color: #495057; cursor: pointer; transition: background 0.2s;
        }
        .nav-btn:hover:not(:disabled) { background: #e2e6ea; }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-autoplay {
            flex-grow: 1; background: #343a40; color: white; border: none;
            border-radius: 12px; font-size: 16px; font-weight: bold; height: 60px; cursor: pointer;
        }
        .btn-autoplay:hover { background: #212529; }

        /* 2, 3단계 퀴즈 공통 */
        .question-box {
            font-size: 18px; font-weight: 700; margin-bottom: 25px; color: #212529;
            background: #f8f9fa; padding: 25px; border-radius: 16px;
            word-break: keep-all; line-height: 1.5; text-align: center; border: 1px solid #e9ecef;
        }
        
        .btn-container { display: flex; flex-direction: column; gap: 12px; }
        
        .option-btn {
            background-color: #ffffff; border: 2px solid #dee2e6; padding: 18px 20px;
            font-size: 16px; border-radius: 14px; cursor: pointer; text-align: left;
            position: relative; color: #495057; font-weight: 600; overflow: hidden;
            transition: all 0.3s ease;
        }
        .option-btn * { pointer-events: none; } 
        
        .option-btn:hover:not(:disabled) { background-color: #f8f9fa; border-color: #adb5bd; }
        .option-btn:disabled { cursor: not-allowed; }

        .correct { background-color: #e6fffa !important; border-color: #20c997 !important; color: #0ca678 !important; }
        .wrong { background-color: #fff5f5 !important; border-color: #fa5252 !important; color: #e03131 !important; opacity: 0.7; }

        .action-btn { background: #007bff; color: white; border: none; padding: 16px; font-size: 18px; font-weight: bold; border-radius: 14px; cursor: pointer; margin-top: 20px; width: 100%; }
        .action-btn:hover { background: #0056b3; }
        .tip-text { text-align: center; font-size: 13px; color: #adb5bd; margin-top: 15px; }

        /* 하단 고정 및 결과창 홈 버튼 스타일 (기존 플로팅 버튼 대체) */
        .app-footer {
            padding: 15px 30px;
            background-color: #f8f9fa;
            border-top: 1px solid #e9ecef;
        }
        .btn-home-footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #ffffff;
            color: #495057;
            border: 2px solid #dee2e6;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-home-footer:hover {
            background: #e9ecef;
            color: #212529;
            border-color: #ced4da;
        }
        .action-btn-home {
            display: block;
            background: #6c757d;
            color: white;
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 14px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            text-decoration: none;
            box-sizing: border-box;
        }
        .action-btn-home:hover { background: #5a6268; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-header">
        <h1>내 마음 번역기 🧠</h1>
        <div class="tab-container">
            <button class="tab-btn active" id="tab-1">단어학습</button>
            <button class="tab-btn" id="tab-2">뜻 맞추기</button>
            <button class="tab-btn" id="tab-3">실전테스트</button>
        </div>
    </div>

    <div class="content-area">
        <div id="section-1" class="section active">
            <div class="learn-progress" id="learn-progress">1 / 120</div>
            <div class="flashcard-scene" id="flashcard-scene">
                <div class="flashcard-inner" id="flashcard-inner">
                    <div class="flashcard-front" id="flashcard-front">단어</div>
                    <div class="flashcard-back" id="flashcard-back">의미</div>
                </div>
            </div>
            <div class="controls">
                <button class="nav-btn" id="btn-prev">◀</button>
                <button class="btn-autoplay" id="btn-shuffle">🔀 카드 섞기</button>
                <button class="nav-btn" id="btn-next">▶</button>
            </div>
            <div class="tip-text">카드를 클릭하면 뜻이 나타납니다.</div>
        </div>

        <div id="section-2" class="section">
            <div class="learn-progress">의미를 보고 알맞은 단어를 고르세요 (무한 반복)</div>
            <div class="question-box" id="step2-question">질문</div>
            <div class="btn-container" id="step2-options"></div>
        </div>

        <div id="section-3" class="section">
            <div id="test-running">
                <div class="learn-progress" id="step3-progress">문제 1 / 120</div>
                <div class="question-box" id="step3-question">질문</div>
                <div class="btn-container" id="step3-options"></div>
            </div>
            <div id="test-result" style="display: none; text-align: center;">
                <h2 style="color:#212529; font-size: 28px; margin-bottom: 10px;">테스트 완료! 🎉</h2>
                <div class="question-box" id="score-text" style="font-size: 24px; color: #007bff; border-color: #cce5ff;">120점 만점에 0점</div>
                <p style="color: #6c757d; margin-bottom: 30px;">나의 감정 어휘력을 잘 확인했나요?</p>
                <button class="action-btn" id="btn-restart">다시 도전하기</button>
                <a href="https://kkamsoo1119-dot.github.io/M.A.P.S./" class="action-btn-home">M.A.P.S. 첫 화면으로</a>
            </div>
        </div>
    </div>

    <!-- 앱 컨테이너 하단 고정 푸터 (모든 탭/화면에서 상시 노출) -->
    <div class="app-footer">
        <a href="https://kkamsoo1119-dot.github.io/M.A.P.S./" class="btn-home-footer">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
            M.A.P.S. 첫 화면으로 이동
        </a>
    </div>
</div>

        { word: "상상", meaning: "실제로 경험하지 않은 현상이나 사물에 대하여 마음속으로 그려 봄." },
        { word: "성장", meaning: "사람이나 동식물 따위가 자라서 점점 커짐. 사물의 규모나 세력 따위가 커짐." },
        { word: "열망", meaning: "열렬하게 바람." },
        { word: "주도성", meaning: "주동이 되어 이끄는 성질." },
        { word: "활기", meaning: "활발한 기운." },
        { word: "고마움", meaning: "남이 베풀어 준 신세나 혜택을 참으로 달갑고 장하게 여기는 마음이 있다." },
        { word: "신뢰", meaning: "굳게 믿고 의지함." },
        { word: "지지", meaning: "어떤 사람이나 단체 따위의 뜻에 찬동하여 이를 위하여 힘을 씀." },

        { word: "따뜻함", meaning: "감정, 태도, 분위기 따위가 정답고 포근하다." },
        { word: "보살핌", meaning: "정성을 기울여 보호하며 돕다." },
        { word: "친밀함", meaning: "지내는 사이가 매우 친하고 가깝다." },
        { word: "다행스러움", meaning: "뜻밖에 일이 잘되어 운이 좋은 데가 있다." },
        { word: "당당함", meaning: "모습이나 태도가 의젓하고 떳떳하다." },
        { word: "자신감", meaning: "자신이 있다는 느낌." },
        { word: "뿌듯함", meaning: "기쁨이나 감격 따위가 마음에 가득 차서 벅차다." },
        { word: "주도", meaning: "주동이 되어 이끎." },
        { word: "독립심", meaning: "남에게 의지하지 아니하고 자기 혼자 힘으로 어려움을 헤쳐 나가거나 맡은 일을 하여 내려는 마음." },
        { word: "확신", meaning: "굳게 믿음. 또는 그런 믿음." },
        { word: "역량", meaning: "어떤 일을 해낼 수 있는 힘." },
        { word: "발휘", meaning: "재능이나 실력 따위를 잘 떨쳐 나타냄." },
        { word: "칭찬", meaning: "좋은 점이나 착하고 훌륭한 일을 높이 평가함. 또는 그런 말." },
        { word: "단단함", meaning: "뜻이나 결심 따위가 흔들림 없이 굳고 위엄이 있다. 연약하지 않고 튼튼하다." },
        { word: "체감", meaning: "몸으로 어떤 자극을 느낌." }
    ];

    // 상태 변수
    let learnCards = [...fullWordData];
    let currentCardIndex = 0;
    let testIndex = 0;
    let testScore = 0;
    let testQuestions = [];
    
    // 테스트 문항 수를 120개 전체로 변경
    const TOTAL_TEST_Q = fullWordData.length; 

    // 즉시 실행 함수 (로딩 지연 방지)
    function initApp() {
        // 탭 메뉴 설정
        document.getElementById('tab-1').onclick = function() { switchTab(1); };
        document.getElementById('tab-2').onclick = function() { switchTab(2); };
        document.getElementById('tab-3').onclick = function() { switchTab(3); };

        // 1단계 컨트롤러 설정
        document.getElementById('flashcard-scene').onclick = flipCard;
        document.getElementById('btn-prev').onclick = prevCard;
        document.getElementById('btn-next').onclick = nextCard;
        document.getElementById('btn-shuffle').onclick = shuffleCards;

        // 3단계 컨트롤러 설정
        document.getElementById('btn-restart').onclick = startTest;

        // 프로그램 시작
        renderStep1();
    }

    // 화면 전환
    function switchTab(step) {
        document.getElementById('tab-1').classList.toggle('active', step === 1);
        document.getElementById('tab-2').classList.toggle('active', step === 2);
        document.getElementById('tab-3').classList.toggle('active', step === 3);

        document.getElementById('section-1').classList.toggle('active', step === 1);
        document.getElementById('section-2').classList.toggle('active', step === 2);
        document.getElementById('section-3').classList.toggle('active', step === 3);

        if (step === 1) renderStep1();
        if (step === 2) loadStep2();
        if (step === 3) startTest();
    }

    // 무한루프 없는 안전한 선택지 섞기
    function generateOptions(correctItem) {
        let options = [correctItem];
        let maxTries = 1000;
        
        while (options.length < 5 && maxTries > 0) {
            let randomItem = fullWordData[Math.floor(Math.random() * fullWordData.length)];
            let isDuplicate = options.some(opt => opt.word === randomItem.word || opt.meaning === randomItem.meaning);
            if (!isDuplicate) options.push(randomItem);
            maxTries--;
        }
        return options.sort(() => Math.random() - 0.5);
    }

    // 1단계 로직
    function renderStep1() { updateCardUI(); }
    function updateCardUI() {
        document.getElementById('learn-progress').innerText = `${currentCardIndex + 1} / ${learnCards.length}`;
        document.getElementById('flashcard-front').innerText = learnCards[currentCardIndex].word;
        document.getElementById('flashcard-back').innerText = learnCards[currentCardIndex].meaning;
        document.getElementById('flashcard-scene').classList.remove('is-flipped');
        document.getElementById('btn-prev').disabled = currentCardIndex === 0;
        document.getElementById('btn-next').disabled = currentCardIndex === learnCards.length - 1;
    }
    function flipCard() { document.getElementById('flashcard-scene').classList.toggle('is-flipped'); }
    function prevCard() { if (currentCardIndex > 0) { currentCardIndex--; updateCardUI(); } }
    function nextCard() { if (currentCardIndex < learnCards.length - 1) { currentCardIndex++; updateCardUI(); } }
    function shuffleCards() { learnCards.sort(() => Math.random() - 0.5); currentCardIndex = 0; updateCardUI(); alert('카드가 무작위로 섞였습니다!'); }

    // 2단계 로직
    function loadStep2() {
        const questionEl = document.getElementById('step2-question');
        const optionsEl = document.getElementById('step2-options');
        optionsEl.innerHTML = ''; 

        const currentData = fullWordData[Math.floor(Math.random() * fullWordData.length)];
        questionEl.innerText = `"${currentData.meaning}"`;

        const options = generateOptions(currentData);

        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.setAttribute('data-value', opt.word);
            
            // 선 그리기(SVG) 요소 없이 깔끔하게 텍스트만 유지
            btn.innerHTML = `<span>${opt.word}</span>`;

            btn.onclick = function() {
                handleAnswer(this, opt.word, currentData.word, optionsEl, loadStep2);
            };

            optionsEl.appendChild(btn);
        });
    }

    // 3단계 로직
    function startTest() {
        document.getElementById('test-running').style.display = 'block';
        document.getElementById('test-result').style.display = 'none';
        testIndex = 0;
        testScore = 0;
        
        // 120개 전체 문제를 랜덤하게 섞어서 출제
        testQuestions = [...fullWordData].sort(() => Math.random() - 0.5).slice(0, TOTAL_TEST_Q);
        loadStep3();
    }

    function loadStep3() {
        const progressEl = document.getElementById('step3-progress');
        const questionEl = document.getElementById('step3-question');
        const optionsEl = document.getElementById('step3-options');
        
        progressEl.innerText = `문제 ${testIndex + 1} / ${TOTAL_TEST_Q}`;
        optionsEl.innerHTML = '';

        const currentData = testQuestions[testIndex];
        questionEl.innerHTML = `<span style="color:#007bff;">'${currentData.word}'</span>의<br>올바른 의미는?`;

        const options = generateOptions(currentData);

        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.setAttribute('data-value', opt.meaning);

            // 선 그리기(SVG) 요소 없이 깔끔하게 텍스트만 유지
            btn.innerHTML = `<span>${opt.meaning}</span>`;

            btn.onclick = function() {
                if (opt.meaning === currentData.meaning) testScore++;
                handleAnswer(this, opt.meaning, currentData.meaning, optionsEl, function() {
                    testIndex++;
                    if (testIndex < TOTAL_TEST_Q) loadStep3();
                    else showTestResult();
                });
            };

            optionsEl.appendChild(btn);
        });
    }

    function showTestResult() {
        document.getElementById('test-running').style.display = 'none';
        document.getElementById('test-result').style.display = 'block';
        document.getElementById('score-text').innerText = `${TOTAL_TEST_Q}점 만점에 ${testScore}점`;
    }

    // 색상 변경 채점 엔진 (동그라미 채점선 제거 및 배경색 변경)
    function handleAnswer(clickedBtn, selectedValue, correctValue, containerEl, nextCallback) {
        const allBtns = containerEl.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.disabled = true); // 클릭 방지

        if (selectedValue === correctValue) {
            // 정답을 맞춘 경우: 클릭한 보기 전체의 배경색을 산뜻한 녹색으로 바꿈
            clickedBtn.classList.add('correct'); 
        } else {
            // 오답을 고른 경우: 클릭한 것은 빨간색(wrong), 정답은 녹색(correct)으로 표시
            clickedBtn.classList.add('wrong');
            allBtns.forEach(b => {
                if (b.getAttribute('data-value') === correctValue) {
                    b.classList.add('correct');
                }
            });
        }
        
        // 1.2초 대기 후 다음으로 넘어가기
        setTimeout(function() {
            nextCallback();
        }, 1200);
    }

    // 앱 실행
    initApp();

</script>
